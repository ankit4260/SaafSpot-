<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanIndia - Leaderboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Table styles tailored to match dashboard.css color palette */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 10px;
        }

        .leaderboard-table th {
            padding: 14px 16px;
            font-size: 13px;
            text-transform: uppercase;
            color: #5c7468;
            border-bottom: 2px solid #DCE9DD;
            font-weight: 600;
        }

        .leaderboard-table td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid #DCE9DD;
            color: #102017;
        }

        .leaderboard-table tr:hover {
            background-color: #F4FAF0;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 13px;
        }

        /* Top 3 podium highlight badges */
        .rank-1 { background-color: #fef9c3; color: #854d0e; }
        .rank-2 { background-color: #e2e8f0; color: #334155; }
        .rank-3 { background-color: #ffedd5; color: #9a3412; }
        .rank-norm { background-color: #e9f4e3; color: #1b4332; }

        .current-user-row {
            background-color: #f2fbd8;
            font-weight: 600;
        }
        
        .loading-text {
            text-align: center;
            padding: 40px;
            color: #5c7468;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <!-- SVG Asset Sprite Registry -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
        <symbol id="i-leaf" viewBox="0 0 24 24"><path d="M6 13c0-5 4-9 13-9 0 9-4 13-13 13-2 0-3-1-3-1 0-1 1-2 3-3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" /><path d="M7 17c2-2 5-5 9-9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></symbol>
        <symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" /><rect x="13" y="3" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" /><rect x="3" y="13" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" /><rect x="13" y="13" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" /></symbol>
        <symbol id="i-pin" viewBox="0 0 24 24"><path d="M12 21s7-7.2 7-12a7 7 0 1 0-14 0c0 4.8 7 12 7 12z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" /><circle cx="12" cy="9" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6" /></symbol>
        <symbol id="i-list" viewBox="0 0 24 24"><circle cx="5" cy="6" r="1.4" fill="currentColor" /><circle cx="5" cy="12" r="1.4" fill="currentColor" /><circle cx="5" cy="18" r="1.4" fill="currentColor" /><path d="M9.5 6h10M9.5 12h10M9.5 18h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></symbol>
        <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" /><path d="M7 5H4v2a3 3 0 0 0 3 3M17 5h3v2a3 3 0 0 1-3 3" fill="none" stroke="currentColor" stroke-width="1.6" /><path d="M12 14v3M9 20h6M9 20l.5-3M15 20l-.5-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></symbol>
        <symbol id="i-wallet" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6" /><path d="M3 10h18" stroke="currentColor" stroke-width="1.6" /><circle cx="16.5" cy="14" r="1.3" fill="currentColor" /><path d="M7 6V5.5A2.5 2.5 0 0 1 9.5 3h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></symbol>
        <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.6" fill="none" stroke="currentColor" stroke-width="1.6" /><path d="M4.5 20c1.4-3.8 4.4-5.8 7.5-5.8s6.1 2 7.5 5.8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></symbol>
        <symbol id="i-logout" viewBox="0 0 24 24"><path d="M9 21H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /><path d="M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></symbol>
        <symbol id="i-flame" viewBox="0 0 24 24"><path d="M12 21c4 0 6.5-2.6 6.5-6 0-2.7-1.7-4.3-2.6-6.2-.6 1.4-1.4 2-2.2 1.4.6-2.6-.6-5-2.7-6.7-.2 2.3-1.2 3.6-2.7 5.2C6.6 10.2 5.5 12 5.5 15c0 3.4 2.5 6 6.5 6z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" /></symbol>
        <symbol id="i-coin" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6" /><path d="M12 7v10M9.5 9.3c0-1.3 1.1-2 2.5-2s2.5.6 2.5 1.7c0 2.5-5 1.3-5 3.8 0 1.1 1.1 1.7 2.5 1.7s2.5-.7 2.5-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" /></symbol>
    </svg>

    <div class="container">
        <!-- ----------- SIDEBAR NAVIGATION ----------- -->
        <aside>
            <a href="dashboard.html" class="brandName">
                <svg class="icon"><use href="#i-leaf" /></svg>
                <span>Saaf<em>Spot</em></span>
            </a>
            <button class="reportBtn">
                <svg class="icon"><use href="#i-pin" /></svg>
                <span>Report a spot</span>
            </button>
            <nav>
                <a href="dashboard.html">
                    <svg class="icon"><use href="#i-grid" /></svg>
                    <span>Dashboard</span>
                </a>
                <a href="submissions.html">
                    <svg class="icon"><use href="#i-list" /></svg>
                    <span>My submissions</span>
                </a>
                <!-- Active Tab -->
                <a href="leaderboard.html" class="currentTab">
                    <svg class="icon"><use href="#i-trophy" /></svg>
                    <span>Leaderboard</span>
                </a>
                <a href="wallet.html">
                    <svg class="icon"><use href="#i-wallet" /></svg>
                    <span>Wallet</span>
                </a>
                <a href="profile.html">
                    <svg class="icon"><use href="#i-user" /></svg>
                    <span>Profile</span>
                </a>
            </nav>
            <button class="logOutBtn">
                <svg class="icon"><use href="#i-logout" /></svg>
                <span>Log Out</span>
            </button>
        </aside>

        <!-- ----------- MAIN WORKSPACE VIEWPORT ----------- -->
        <main>
            <!-- TOPBAR MODULE -->
            <div class="topbar">
                <h1>Leaderboard</h1>
                <div>
                    <span id="tobar-left-pt">
                        <svg class="icon"><use href="#i-coin" /></svg>
                        <span id="totalPoints2">0</span><span>pts</span>
                    </span>
                    <span id="tobar-left-u">--</span>
                </div>
            </div>

            <!-- VIEW PANEL SECTION -->
            <section>
                <div class="wback">
                    Regional standings for <span id="userCity" style="font-weight: 600;">...</span> — See how you match up with your community.
                </div>

                <!-- SINGLE CONTENT PANEL FRAME -->
                <div class="rightPannel" style="max-height: none; width: 100%;">
                    <div class="rightPannel_head">
                        <h2>Top Cleanliness Warriors</h2>
                    </div>
                    
                    <div id="loading" class="loading-text">Fetching live standings...</div>

                    <!-- LEADERBOARD DATA TABLE -->
                    <div id="table-container" style="display: none;">
                        <table class="leaderboard-table">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Citizen Name</th>
                                    <th>City/Zone</th>
                                    <th>Streak</th>
                                    <th>Total Score</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-rows">
                                <!-- Dynamic rows injected here -->
                            </tbody>
                        </table>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script src="leaderboard.js"></script>
</body>
</html>
