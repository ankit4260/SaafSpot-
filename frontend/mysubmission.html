<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mysubmissions</title>
    <link rel="stylesheet" href="mySubmission.css">
</head>

<body>
    <!-- svgs -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
        <symbol id="i-leaf" viewBox="0 0 24 24">
            <path d="M6 13c0-5 4-9 13-9 0 9-4 13-13 13-2 0-3-1-3-1 0-1 1-2 3-3z" fill="none" stroke="currentColor"
                stroke-width="1.6" stroke-linejoin="round" />
            <path d="M7 17c2-2 5-5 9-9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </symbol>
        <symbol id="i-grid" viewBox="0 0 24 24">
            <rect x="3" y="3" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <rect x="13" y="3" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <rect x="3" y="13" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <rect x="13" y="13" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
        </symbol>
        <symbol id="i-pin" viewBox="0 0 24 24">
            <path d="M12 21s7-7.2 7-12a7 7 0 1 0-14 0c0 4.8 7 12 7 12z" fill="none" stroke="currentColor"
                stroke-width="1.6" stroke-linejoin="round" />
            <circle cx="12" cy="9" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6" />
        </symbol>
        <symbol id="i-list" viewBox="0 0 24 24">
            <circle cx="5" cy="6" r="1.4" fill="currentColor" />
            <circle cx="5" cy="12" r="1.4" fill="currentColor" />
            <circle cx="5" cy="18" r="1.4" fill="currentColor" />
            <path d="M9.5 6h10M9.5 12h10M9.5 18h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </symbol>
        <symbol id="i-trophy" viewBox="0 0 24 24">
            <path d="M7 4h10v5a5 5 0 0 1-10 0V4z" fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linejoin="round" />
            <path d="M7 5H4v2a3 3 0 0 0 3 3M17 5h3v2a3 3 0 0 1-3 3" fill="none" stroke="currentColor"
                stroke-width="1.6" />
            <path d="M12 14v3M9 20h6M9 20l.5-3M15 20l-.5-3" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" />
        </symbol>
        <symbol id="i-wallet" viewBox="0 0 24 24">
            <rect x="3" y="6" width="18" height="13" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M3 10h18" stroke="currentColor" stroke-width="1.6" />
            <circle cx="16.5" cy="14" r="1.3" fill="currentColor" />
            <path d="M7 6V5.5A2.5 2.5 0 0 1 9.5 3h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </symbol>
        <symbol id="i-user" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="3.6" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M4.5 20c1.4-3.8 4.4-5.8 7.5-5.8s6.1 2 7.5 5.8" fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" />
        </symbol>
        <symbol id="i-logout" viewBox="0 0 24 24">
            <path d="M9 21H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h4" fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round" />
            <path d="M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round" />
        </symbol>
        <symbol id="i-menu" viewBox="0 0 24 24">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </symbol>
        <symbol id="i-close" viewBox="0 0 24 24">
            <path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </symbol>
        <symbol id="i-check" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9.2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M8 12.3l2.6 2.6L16.2 9" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                stroke-linejoin="round" />
        </symbol>
        <symbol id="i-clock" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9.2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M12 7v5.2l3.6 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round" />
        </symbol>
        <symbol id="i-flag" viewBox="0 0 24 24">
            <path d="M6 21V4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            <path d="M6 4h11l-2.5 4L17 12H6" fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linejoin="round" />
        </symbol>
        <symbol id="i-half" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9.2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M12 2.8A9.2 9.2 0 0 1 12 21.2z" fill="currentColor" />
        </symbol>
        <symbol id="i-camera" viewBox="0 0 24 24">
            <path d="M4 8h3l1.6-2.4h6.8L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"
                fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
            <circle cx="12" cy="13" r="3.4" fill="none" stroke="currentColor" stroke-width="1.6" />
        </symbol>
        <symbol id="i-shield" viewBox="0 0 24 24">
            <path d="M12 3l7 3v6c0 4.6-3 7.8-7 9-4-1.2-7-4.4-7-9V6l7-3z" fill="none" stroke="currentColor"
                stroke-width="1.6" stroke-linejoin="round" />
        </symbol>
        <symbol id="i-flame" viewBox="0 0 24 24">
            <path
                d="M12 21c4 0 6.5-2.6 6.5-6 0-2.7-1.7-4.3-2.6-6.2-.6 1.4-1.4 2-2.2 1.4.6-2.6-.6-5-2.7-6.7-.2 2.3-1.2 3.6-2.7 5.2C6.6 10.2 5.5 12 5.5 15c0 3.4 2.5 6 6.5 6z"
                fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
        </symbol>
        <symbol id="i-medal" viewBox="0 0 24 24">
            <circle cx="12" cy="14" r="6.2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M9.5 9L7 3M14.5 9L17 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            <path d="M12 11.6l1 2 2.1.2-1.6 1.4.5 2-2-1.1-2 1.1.5-2-1.6-1.4 2.1-.2 1-2z" fill="currentColor" />
        </symbol>
        <symbol id="i-rocket" viewBox="0 0 24 24">
            <path d="M13 3c3 1 5.5 4 5.5 8-2 .3-4 .1-5.5-1.5C11.5 11 9.5 11.2 7.5 11 7.5 7 10 4 13 3z" fill="none"
                stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
            <path d="M9 14c-2 .5-3 2-3.5 4.5C8 18 9.5 17 10 15M14 14c.6 1.6 2 2.4 4 2-1-1.5-1-3.2-1-4" fill="none"
                stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
            <circle cx="13.5" cy="8.5" r="1.3" fill="currentColor" />
        </symbol>
        <symbol id="i-arrow" viewBox="0 0 24 24">
            <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
        </symbol>
        <symbol id="i-chev" viewBox="0 0 24 24">
            <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
        </symbol>
        <symbol id="i-thumb" viewBox="0 0 24 24">
            <path
                d="M7 11v9H4v-9h3zM7 11l3.5-7c1 0 2 .8 2 2v3h5.2c1 0 1.7 1 1.3 2l-1.8 6.2c-.3 1-1.1 1.8-2.2 1.8H10a3 3 0 0 1-3-3v-5z"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
        </symbol>
        <symbol id="i-crosshair" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </symbol>
        <symbol id="i-coin" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path
                d="M12 7v10M9.5 9.3c0-1.3 1.1-2 2.5-2s2.5.6 2.5 1.7c0 2.5-5 1.3-5 3.8 0 1.1 1.1 1.7 2.5 1.7s2.5-.7 2.5-2"
                stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </symbol>
        <symbol id="i-bolt" viewBox="0 0 24 24">
            <path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="currentColor" />
        </symbol>
        <symbol id="i-info" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9.2" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" />
        </symbol>
    </svg>
    <!-- mySubmission -->
    <div class="container">
        <aside>
            <a href="dashboard.html" class=" brandName">
                <svg class="icon">
                    <use href="#i-leaf" />
                </svg>
                <span>Saaf<em>Spot</em></span>
            </a>
            <button class="reportBtn">
                <svg class="icon">
                    <use href="#i-pin" />
                </svg>
                <span>Report a spot</span>
            </button>
            <nav>
                <a href="dashboard.html" class="">
                    <svg class="icon">
                        <use href="#i-grid" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="mysubmission.html" class="currentTab">
                    <svg class="icon">
                        <use href="#i-list" />
                    </svg>
                    <span>My submissions</span>
                </a>
                <a href="leaderboard.html" class="">
                    <svg class="icon">
                        <use href="#i-trophy" />
                    </svg>
                    <span>Leaderboard</span>
                </a>
                <a href="#" class="">
                    <svg class="icon">
                        <use href="#i-wallet" />
                    </svg>
                    <span>Wallet</span>
                </a>
                <a href="#" class="">
                    <svg class="icon">
                        <use href="#i-user" />
                    </svg>
                    <span>Profile</span>
                </a>
            </nav>
            <button class="logOutBtn">
                <svg class="icon">
                    <use href="#i-logout" />
                </svg>
                <span>Log Out</span>
            </button>
        </aside>
        <main>
            <div class="topbar">
                <h1>My submissions</h1>
                <div>
                    <span id="tobar-left-pt">
                        <svg class="icon">
                            <use href="#i-coin" />
                        </svg>
                        <span>2,150</span>
                        <span>pts</span>
                    </span>
                    <span id="tobar-left-u">AC</span>
                </div>
            </div>
            <section>
                <div class="headtext">Every spot you've reported or cleaned, and where it stands.</div>
                <div class="filter">
                    <button class="filter_current">All</button>
                    <button>AI verifying</button>
                    <button>Verified</button>
                    <button>Partial match</button>
                    <button>Rejected</button>
                </div>
                <div class="submissionList">
                    
                </div>
            </section>
            <script src="mysubmission.js"></script>
</body>

</html>
